name: build

# Construye la app empaquetada para Windows y macOS.
#   • Se dispara a mano (Actions → build → Run workflow) para PROBAR, o
#   • al empujar una etiqueta v* (git tag v1.0 && push) → además CREA la Release
#     de GitHub con los dos zips adjuntos, listos para descargar desde la landing.
#
# Los nombres de los zip son EXACTAMENTE los que espera la landing (sensibles a
# mayúsculas en las URLs de GitHub):
#   AutoFaceless-Studio-macOS.zip   ·   AutoFaceless-Studio-Windows.zip

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write        # necesario para crear la Release

jobs:
  # ---------------- Windows (.exe onedir) ----------------
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Descargar ffmpeg estático de Windows
        run: |
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath fftmp -Force
          $bin = (Get-ChildItem -Recurse fftmp -Filter ffmpeg.exe | Select-Object -First 1).Directory
          New-Item -ItemType Directory -Force empaquetado/ffmpeg-win | Out-Null
          Copy-Item (Join-Path $bin "ffmpeg.exe")  empaquetado/ffmpeg-win/
          Copy-Item (Join-Path $bin "ffprobe.exe") empaquetado/ffmpeg-win/

      - name: Empaquetar con PyInstaller
        run: pyinstaller empaquetar.spec --noconfirm --clean

      - name: Armar el paquete de descarga (carpeta + LÉEME)
        run: |
          $stage = "AutoFaceless Studio"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Move-Item "dist/AutoFaceless Video" "$stage/"
          @"
          AutoFaceless Studio (Windows)

          COMO ABRIR:
            1. Abre la carpeta "AutoFaceless Video".
            2. Ejecuta "AutoFaceless Video.exe".
            3. Si Windows muestra "Windows protegio tu PC":
               haz clic en "Mas informacion" y luego en "Ejecutar de todas formas".
               (Aparece solo porque la app todavia no esta firmada; es segura.)

          Se abrira en tu navegador. La primera transcripcion descarga un modelo
          de voz (unos minutos, solo la primera vez).

          Gratis para siempre. Pro y Premium se activan dentro de la app con un
          codigo de licencia. Soporte: derekog7@gmail.com
          "@ | Out-File -Encoding utf8 "$stage/LEEME primero.txt"
          Compress-Archive -Path "$stage" -DestinationPath "AutoFaceless-Studio-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: AutoFaceless-Studio-Windows
          path: AutoFaceless-Studio-Windows.zip

  # ---------------- macOS (.app) ----------------
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Descargar ffmpeg estático de macOS (evermeet)
        run: |
          mkdir -p empaquetado/ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"  -o ff.zip  && unzip -o ff.zip  -d empaquetado/ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o fp.zip  && unzip -o fp.zip -d empaquetado/ffmpeg
          chmod +x empaquetado/ffmpeg/ffmpeg empaquetado/ffmpeg/ffprobe

      - name: Empaquetar con PyInstaller
        run: pyinstaller empaquetar.spec --noconfirm --clean

      - name: Armar el paquete de descarga (.app + abridor + LÉEME)
        run: |
          STAGE="AutoFaceless Studio"
          mkdir -p "$STAGE"
          mv "dist/AutoFaceless Video.app" "$STAGE/"
          cp "empaquetado/Abrir AutoFaceless Video.command" "$STAGE/"
          chmod +x "$STAGE/Abrir AutoFaceless Video.command"
          cat > "$STAGE/LEEME primero.txt" <<'EOF'
          AutoFaceless Studio (macOS)

          PRIMERA VEZ: clic derecho en "Abrir AutoFaceless Video.command" -> Abrir.
          (Es necesario porque la app aun no esta firmada por Apple; es segura.)

          Gratis para siempre: editor completo + IA gratis, 720p con marca de agua.
          Pro y Premium se activan dentro de la app con un codigo de licencia.

          Requisitos: Mac Apple Silicon (M1 o mas nuevo), macOS 11+.
          Soporte: derekog7@gmail.com
          EOF
          xattr -cr "$STAGE/AutoFaceless Video.app" || true
          ditto -c -k --sequesterRsrc --keepParent "$STAGE" "AutoFaceless-Studio-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: AutoFaceless-Studio-macOS
          path: AutoFaceless-Studio-macOS.zip

  # ---------------- Release (solo al empujar un tag v*) ----------------
  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Descargar los dos paquetes
        uses: actions/download-artifact@v4
        with:
          path: paquetes
          merge-multiple: true

      - name: Crear/actualizar la Release con los zips
        uses: softprops/action-gh-release@v2
        with:
          files: paquetes/*.zip
          generate_release_notes: true
          name: AutoFaceless Studio ${{ github.ref_name }}
          body: |
            Descarga la app gratis:

            - **macOS** (Apple Silicon, macOS 11+): `AutoFaceless-Studio-macOS.zip`
            - **Windows** (10/11, 64 bits): `AutoFaceless-Studio-Windows.zip`

            Gratis para siempre. Pro y Premium se activan dentro de la app.
